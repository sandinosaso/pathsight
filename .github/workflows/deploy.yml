name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker europe-central2-docker.pkg.dev --quiet

      # Cloud Build's `docker build` sandbox has no Application Default
      # Credentials, so we cannot fetch the model from GCS inside the
      # Dockerfile. Instead we download it on the runner (which is already
      # authenticated) and let it be part of the build context that gets
      # uploaded to Cloud Build.
      - name: Download model + metadata from GCS
        env:
          MODEL_BUCKET_NAME: pathsight-models-wagon-bootcamp-489111
        run: |
          mkdir -p artifacts/models
          gcloud storage cp "gs://${MODEL_BUCKET_NAME}/best_model.keras" artifacts/models/best_model.keras
          gcloud storage cp "gs://${MODEL_BUCKET_NAME}/best_model.json"  artifacts/models/best_model.json

      - name: Build and deploy backend
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: make -C backend docker_up

  # ── Frontend ───────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend to Firebase Hosting
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE: /api
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: live
