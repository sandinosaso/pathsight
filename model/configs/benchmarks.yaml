# PCam Benchmark Experiment Matrix
#
# Each entry maps directly to a RunConfig dataclass field.
# Run the full sweep with:
#   python model/scripts/run_benchmark.py --config model/configs/benchmarks.yaml
#
# Run a single entry with:
#   python model/scripts/run_benchmark.py --config model/configs/benchmarks.yaml --only mobilenetv3small_96

# ── MobileNetV3Small ────────────────────────────────────────────────────────
# - run_id: mobilenetv3small_96
#   backbone: mobilenetv3small
#   image_size: 96
#   stage1_epochs: 4
#   stage2_epochs: 3
#   fine_tune_layers: 30
#   # Notes: Best candidate for native PCam resolution — no upscaling artefacts.

# - run_id: mobilenetv3small_128
#   backbone: mobilenetv3small
#   image_size: 128
#   stage1_epochs: 4
#   stage2_epochs: 3
#   fine_tune_layers: 30
#   # Notes: Strong efficiency/performance trade-off; slight upscale from 96.

# # ── MobileNetV3Large ────────────────────────────────────────────────────────
