# ── EfficientNetV2B0 — Shayan-notebook reproduction ─────────────────────────
# Best-effort YAML simulation of:
#   notebooks/shayanghavami_06_EfficientNetV2B0_model_training.ipynb
#
# What this config matches:
#   backbone=EfficientNetV2B0, image_size=96, batch_size=32,
#   Adam(lr=1e-4), 10 epochs (single stage), 25 000 train samples,
#   head_dropout=0.3 (notebook value).
#
# What is now matched via YAML knobs (previously required code changes):
#   - head_style=minimal: GAP → BN → Dropout → Dense(1); matches notebook head exactly.
#   - freeze_backbone=false: backbone trainable from epoch 1; matches notebook's
#     base_model.trainable=True approach (end-to-end single-stage training).
#
# Remaining residual differences (low impact):
#   - ReduceLROnPlateau: runner monitors val_pr_auc (patience=3, cooldown=1);
#     notebook monitors val_loss (patience=2, cooldown=0) — functionally similar.
#   - Threshold: runner reports at best_f1_threshold; notebook reports at 0.5/0.3.
#
# Before running, set these in .env:
#   PCAM_AUGMENT_TRAIN=False        # notebook has zero augmentation
#   PCAM_EARLY_STOP_MONITOR=val_auc # notebook monitors val_auc, not val_pr_auc
#
# Run with:
#   python model/scripts/run_benchmark.py \
#     --config model/configs/benchmarks.yaml \
#     --only efficientnetb0_96_shayanghavami
