#   # Notes: Compare vs EfficientNetB0 at the same resolution.

# ── ResNet50 ────────────────────────────────────────────────────────────────
- run_id: resnet50_96
  backbone: resnet50
  image_size: 96
  stage1_epochs: 10
  stage2_epochs: 5
  fine_tune_layers: 30
  batch_size: 32
  max_train_samples: 20000       # Stage 1 (frozen backbone): fast, head saturates here.
  stage2_train_samples: 50000    # Stage 2 (fine-tune 24 layers): broader distribution.

- run_id: resnet50_128
  backbone: resnet50
  image_size: 128
  stage1_epochs: 10
  stage2_epochs: 5
  fine_tune_layers: 30
  batch_size: 32
  max_train_samples: 20000       # Stage 1 (frozen backbone): fast, head saturates here.
  stage2_train_samples: 50000    # Stage 2 (fine-tune 24 layers): broader distribution.
  # Notes: Strong feature extractor for medical textures; heavier — use batch_size 16.

- run_id: resnet50_224
  backbone: resnet50
  image_size: 224
  stage1_epochs: 10
  stage2_epochs: 5
  fine_tune_layers: 30
  batch_size: 32
  max_train_samples: 20000       # Stage 1 (frozen backbone): fast, head saturates here.
  stage2_train_samples: 50000    # Stage 2 (fine-tune 24 layers): broader distribution.
  # Notes: Proven baseline; compare with EfficientNetB0 at same resolution.

