- run_id: efficientnetb0_96_4
  backbone: efficientnetb0
  image_size: 96
  stage1_epochs: 15               # notebook configured 10 (run was interrupted at epoch 4)
  stage2_epochs: 0                # disable stage 2 — notebook is single-stage end-to-end
  fine_tune_layers: 0             # irrelevant when stage2_epochs=0; explicit for clarity
  batch_size: 32
  head_style: default             # GAP → BN → Dropout → Dense(1); matches notebook head
  head_dropout: 0.3               # notebook value (our tuned default is 0.4)
  freeze_backbone: false          # notebook sets base_model.trainable=True from the start
  learning_rate: 1.0e-4           # notebook's only LR (our default is 1e-3)
  fine_tune_lr: 1.0e-4            # not used (stage 2 disabled); kept explicit for safety
  max_train_samples: 100000       # notebook take(25000)

